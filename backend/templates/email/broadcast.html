<!DOCTYPE html>
<html>

<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <!-- Header -->
        <div
            style="background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); padding: 20px; border-radius: 8px 8px 0 0;">
            <h1 style="color: white; margin: 0; font-size: 24px;">📢 Pengumuman HR</h1>
        </div>

        <!-- Content -->
        <div style="background: #ffffff; padding: 25px; border: 1px solid #e0e0e0; border-top: none;">
            <h2 style="color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
                {subject}
            </h2>

            <p>Kepada Yth.,<br>
                <strong>{recipient_name}</strong>
            </p>

            <div
                style="background-color: #f8f9fa; padding: 20px; border-left: 4px solid #3498db; margin: 20px 0; border-radius: 4px;">
                <p style="margin: 0; white-space: pre-line;">{message}</p>
            </div>

            <p><strong>Tanggal:</strong> {sent_date}</p>
        </div>

        <!-- Footer -->
        <div
            style="background: #f5f5f5; padding: 15px; border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px;">
            <p style="color: #666; font-size: 12px; margin: 0;">
                Jika memiliki pertanyaan, silakan hubungi HR Department.<br><br>
                Hormat kami,<br>
                <strong>Tim HR</strong>
            </p>
            <hr style="border: none; border-top: 1px solid #ddd; margin: 15px 0;">
            <p style="color: #999; font-size: 11px; margin: 0; text-align: center;">
                Email ini dikirim secara otomatis oleh HR System. Mohon tidak membalas email ini.
            </p>
        </div>
    </div>
</body>

</html>
